# NEXUS VIP HOST - Nginx Configuration
# Place in /etc/nginx/sites-available/nexus-vip-host

server {
    listen 80;
    server_name nexusviphost.com www.nexusviphost.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nexusviphost.com www.nexusviphost.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/nexusviphost.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexusviphost.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Static files
    location /static/ {
        alias /var/www/nexus-vip-host/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to Flask/Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/nexus-vip-host-access.log;
    error_log /var/log/nginx/nexus-vip-host-error.log;
}
