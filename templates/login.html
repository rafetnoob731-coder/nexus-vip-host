{% extends "base.html" %}
{% block title %}Login - NEXUS VIP HOST{% endblock %}

{% block content %}
<div class="page-banner">
  <div class="container">
    <h1>Client <span class="gradient-text">Login</span></h1>
    <p>Access your hosting dashboard</p>
  </div>
</div>

<div class="container">
  <div class="auth-container">
    <div class="auth-card glass">
      <div class="auth-header">
        <div class="auth-icon">🚀</div>
        <h2>Welcome Back</h2>
        <p>Sign in to manage your services</p>
      </div>
      <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
        <div class="form-group">
          <label>Email or Username</label>
          <input type="text" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" name="remember" checked> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        <p class="auth-divider"><span>Or continue with</span></p>
        <div class="social-auth">
          <button type="button" class="btn btn-outline"><i class="fab fa-google"></i> Google</button>
          <button type="button" class="btn btn-outline"><i class="fab fa-github"></i> GitHub</button>
        </div>
        <p class="auth-footer">
          Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
        </p>
      </form>
    </div>
  </div>
</div>

<style>
.auth-container { max-width: 480px; margin: 2rem auto; }
.auth-card { padding: 2.5rem; }
.auth-header { text-align: center; margin-bottom: 2rem; }
.auth-icon { font-size: 3rem; margin-bottom: 0.5rem; }
.auth-header h2 { font-size: 1.75rem; margin-bottom: 0.5rem; }
.auth-header p { color: var(--text-secondary); }
.auth-footer { text-align: center; margin-top: 1.5rem; color: var(--text-secondary); }
.auth-footer a { color: var(--primary); }
</style>
{% endblock %}
