{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem">
  <div>
    <div style="font-size:6rem;margin-bottom:1rem">🔍</div>
    <h1 style="font-size:3rem;margin-bottom:0.5rem">404</h1>
    <h2 style="color:var(--text-secondary);margin-bottom:1.5rem">Page Not Found</h2>
    <p style="color:var(--text-secondary);margin-bottom:2rem">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go Home <i class="fas fa-arrow-right"></i></a>
  </div>
</div>
{% endblock %}
