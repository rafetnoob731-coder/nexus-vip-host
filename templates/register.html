{% extends "base.html" %}
{% block title %}Register - NEXUS VIP HOST{% endblock %}

{% block content %}
<div class="page-banner">
  <div class="container">
    <h1>Create <span class="gradient-text">Account</span></h1>
    <p>Join thousands of satisfied customers</p>
  </div>
</div>

<div class="container">
  <div class="auth-container">
    <div class="auth-card glass">
      <div class="auth-header">
        <div class="auth-icon">🚀</div>
        <h2>Get Started Today</h2>
        <p>Create your account in seconds</p>
      </div>
      <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" class="form-control" placeholder="johndoe" required
                 value="{{ request.form.get('username', '') }}">
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" class="form-control" placeholder="John Doe"
                 value="{{ request.form.get('full_name', '') }}">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="your@email.com" required
                 value="{{ request.form.get('email', '') }}">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" name="agree_terms" required> I agree to the <a href="#">Terms of Service</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        <p class="auth-footer">
          Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
