{% extends "base.html" %}
{% block title %}Profile - NEXUS VIP HOST{% endblock %}

{% block content %}
<div class="page-banner">
  <div class="container">
    <h1>My <span class="gradient-text">Profile</span></h1>
    <p>Manage your account settings</p>
  </div>
</div>

<div class="container">
  <div class="profile-grid">
    <div class="glass" style="padding:2rem">
      <h2 style="margin-bottom:1.5rem">Account <span class="gradient-text">Information</span></h2>
      <form method="POST" action="{{ url_for('auth.profile') }}">
        <div class="form-group">
          <label>Username</label>
          <input type="text" class="form-control" value="{{ user.username }}" disabled>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" value="{{ user.email }}" disabled>
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" class="form-control" value="{{ user.full_name or '' }}" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" name="company" class="form-control" value="{{ user.company or '' }}" placeholder="Your company">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" class="form-control" value="{{ user.phone or '' }}" placeholder="+1 (555) 123-4567">
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea name="address" class="form-control" rows="3" placeholder="Your address">{{ user.address or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>

    <div class="glass" style="padding:2rem">
      <h2 style="margin-bottom:1.5rem">Change <span class="gradient-text">Password</span></h2>
      <form method="POST" action="{{ url_for('auth.change_password') }}">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" name="current_password" class="form-control" required>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="new_password" class="form-control" required minlength="8">
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-control" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary">Update Password</button>
      </form>
    </div>
  </div>
</div>

<style>
.profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin:2rem auto; max-width:1000px; }
@media (max-width:768px) { .profile-grid { grid-template-columns:1fr; } }
</style>
{% endblock %}
