{% extends "base.html" %}
{% block title %}Create Ticket - NEXUS VIP HOST{% endblock %}

{% block content %}
<div class="page-banner">
  <div class="container">
    <h1>Create <span class="gradient-text">Ticket</span></h1>
    <p>Get help from our support team</p>
  </div>
</div>

<div class="container">
  <div class="glass" style="max-width:700px;margin:0 auto;padding:2rem">
    <form method="POST" action="{{ url_for('main.create_ticket') }}">
      <div class="form-group">
        <label>Subject</label>
        <input type="text" name="subject" class="form-control" placeholder="Brief description of your issue" required>
      </div>
      <div class="form-group">
        <label>Department</label>
        <select name="department" class="form-control">
          <option value="general">General</option>
          <option value="technical">Technical Support</option>
          <option value="sales">Sales</option>
          <option value="billing">Billing</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select name="priority" class="form-control">
          <option value="low">Low</option>
          <option value="normal" selected>Normal</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="message" class="form-control" rows="8" placeholder="Describe your issue in detail..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Submit Ticket <i class="fas fa-paper-plane"></i></button>
    </form>
  </div>
</div>
{% endblock %}
